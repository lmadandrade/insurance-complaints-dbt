version: 2

sources:
  - name: insurance_complaints_raw
    description: "Raw insurance complaints data loaded into BigQuery"
    database: project-76025d8f-900f-4129-8e7
    schema: raw
    tables:
      - name: policies
        description: "Raw policies data at policy grain (one row per policy)"
        columns:
          - name: policy_id
            description: Unique identifier for a policy in the raw source
            tests:
              - not_null
              - unique

      - name: complaints
        description: "Raw customer complaints linked to policies"
        columns:
          - name: complaint_id
            description: Unique identifier for a complaint in the raw source
            tests:
              - not_null
              - unique
          - name: policy_id
            description: Policy identifier linked to a complaint
            tests:
              - not_null

      - name: complaint_events
        description: "Event log tracking the lifecycle of each complaint"
        columns:
          - name: event_id
            description: Unique identifier for a complaint event in the raw source
            tests:
              - not_null
              - unique
          - name: complaint_id
            description: Complaint identifier linked to the event
            tests:
              - not_null